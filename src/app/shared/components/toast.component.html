<div class="fixed right-4 top-4 z-50 flex flex-col gap-3">
  @for (toast of notificationService.toasts(); track toast.id) {
    <div
      class="flex w-80 items-center gap-3 rounded-lg p-4 shadow-lg"
      [class]="toastConfig[toast.type].classes"
      role="alert"
    >
      <lucide-icon
        [img]="toastConfig[toast.type].icon"
        [size]="20"
        class="shrink-0"
      ></lucide-icon>

      <span class="flex-1 text-sm font-medium">{{ toast.message }}</span>

      <button
        (click)="notificationService.dismiss(toast.id)"
        class="shrink-0 rounded p-1 transition-colors hover:bg-black/10"
        aria-label="Cerrar notificación"
      >
        <lucide-icon [img]="closeIcon" [size]="16"></lucide-icon>
      </button>
    </div>
  }
</div>
