<div class="flex flex-col justify-between rounded-xl border border-gray-200 bg-white p-5 shadow-sm transition-shadow hover:shadow-md">
  <div>
    <div class="mb-3 flex items-center justify-between">
      <span
        class="rounded-full px-3 py-1 text-xs font-semibold"
        [class]="fund().category === 'FPV'
          ? 'bg-blue-100 text-blue-700'
          : 'bg-purple-100 text-purple-700'"
      >
        {{ fund().category }}
      </span>

      @if (subscribed()) {
        <span class="rounded-full bg-green-100 px-3 py-1 text-xs font-semibold text-green-700">
          Suscrito
        </span>
      }
    </div>

    <h3 class="mb-1 text-sm font-bold text-gray-900">{{ fund().name }}</h3>

    <p class="text-sm text-gray-500">
      Monto mínimo: <span class="font-semibold text-gray-700">{{ fund().minimumAmount | copCurrency }}</span>
    </p>
  </div>

  <button
    (click)="subscribe.emit()"
    [disabled]="subscribed() || disabled()"
    class="mt-4 w-full rounded-lg bg-blue-600 px-4 py-2.5 text-sm font-semibold text-white transition-colors hover:bg-blue-700 disabled:cursor-not-allowed disabled:bg-gray-300 disabled:text-gray-500"
  >
    {{ subscribed() ? 'Ya suscrito' : 'Suscribirse' }}
  </button>
</div>
