<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 animate-in fade-in"
  (click)="cancelled.emit()"
>
  <div
    #dialogPanel
    class="mx-4 w-full max-w-md rounded-lg bg-white p-6 shadow-xl animate-in zoom-in-95 fade-in duration-200"
    role="dialog"
    aria-modal="true"
    aria-labelledby="confirm-dialog-title"
    aria-describedby="confirm-dialog-message"
    (click)="$event.stopPropagation()"
  >
    <h3 id="confirm-dialog-title" class="mb-2 text-lg font-semibold text-gray-900">{{ title() }}</h3>
    <p id="confirm-dialog-message" class="mb-6 text-gray-600">{{ message() }}</p>
    <div class="flex justify-end gap-3">
      <button
        class="rounded-lg px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100 focus-visible:ring-2 focus-visible:ring-blue-500 focus-visible:ring-offset-2"
        [disabled]="loading()"
        (click)="cancelled.emit()"
      >
        {{ cancelLabel() }}
      </button>
      <button
        class="inline-flex items-center gap-2 rounded-lg bg-red-600 px-4 py-2 text-sm font-medium text-white hover:bg-red-700 focus-visible:ring-2 focus-visible:ring-blue-500 focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:bg-red-400"
        [disabled]="loading()"
        (click)="confirmed.emit()"
      >
        @if (loading()) {
          <span class="inline-block h-4 w-4 animate-spin rounded-full border-2 border-white/30 border-t-white" role="status" aria-label="Cargando"></span>
          Procesando...
        } @else {
          {{ confirmLabel() }}
        }
      </button>
    </div>
  </div>
</div>
