<div class="flex flex-col justify-between rounded-xl border border-gray-200 bg-white p-5 shadow-sm">
  <div>
    <h3 class="mb-1 text-sm font-bold text-gray-900">{{ subscription().fundName }}</h3>

    <div class="mt-3 space-y-2 text-sm text-gray-500">
      <p>
        Monto invertido:
        <span class="font-semibold text-gray-700">{{ subscription().amount | copCurrency }}</span>
      </p>
      <p>
        Notificación:
        <span class="font-semibold text-gray-700">
          {{ subscription().notificationMethod === 'email' ? 'Email' : 'SMS' }}
        </span>
      </p>
      <p>
        Fecha:
        <span class="font-semibold text-gray-700">
          {{ subscription().subscribedAt | date: 'dd/MM/yyyy' }}
        </span>
      </p>
    </div>
  </div>

  <button
    (click)="cancel.emit()"
    [disabled]="disabled()"
    class="mt-4 w-full rounded-lg border border-red-300 bg-white px-4 py-2.5 text-sm font-semibold text-red-600 transition-colors hover:bg-red-50 disabled:cursor-not-allowed disabled:border-gray-200 disabled:text-gray-400"
  >
    Cancelar suscripción
  </button>
</div>
